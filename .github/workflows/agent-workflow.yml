name: Agent workflow daily

on:
  workflow_dispatch:
    inputs:
      allow_combine:
        description: "Allow small-feature arch to implementation in one run"
        type: boolean
        default: false
  pull_request:
    types: [labeled]
  schedule:
    - cron: "0 15 * * *"

concurrency:
  group: agent-workflow
  cancel-in-progress: false

jobs:
  daily:
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'workflow/') &&
      (github.event.label.name == 'workflow:approve' ||
      github.event.label.name == 'workflow:reject'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Run daily workflow
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WORKFLOW_EMAIL_TO: ${{ secrets.WORKFLOW_EMAIL_TO }}
          WORKFLOW_EMAIL_FROM: ${{ secrets.WORKFLOW_EMAIL_FROM }}
          WORKFLOW_REPO: ${{ github.repository }}
          WORKFLOW_DEFAULT_BRANCH: main
          WORKFLOW_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALLOW_COMBINE: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_combine || false }}
        run: npm run workflow:daily
